<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ratecoach</title>
    
    <!-- standalone app meta tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <!-- pwa manifest + icon -->
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --accent: #fde047;
            --text: #ffffff;
            --text-dim: #a1a1aa;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .font-mono { font-family: 'Roboto Mono', monospace; }
        .lowercase { text-transform: lowercase; }
        
        #app-window {
            width: 100%;
            max-width: 420px;
            height: 100%;
            max-height: 800px;
            display: flex;
            flex-direction: column;
            position: relative;
            background: var(--bg);
        }

        .main-tap-zone {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 2px solid #18181b;
            border-radius: 3rem;
            margin: 1rem 0;
            transition: background-color 0.05s, transform 0.05s;
        }
        .main-tap-zone:active {
            background-color: #1a1505;
            transform: scale(0.99);
        }
        .main-tap-zone.recording { border-color: #713f12; }

        .btn {
            padding: 1.25rem;
            border-radius: 1.25rem;
            font-weight: 700;
            text-align: center;
            transition: opacity 0.1s;
        }
        .btn:active { opacity: 0.7; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-dark { background: #18181b; color: #fff; }
        .btn-danger { background: #450a0a; color: #f87171; }

        .custom-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="app-window"></div>

    <script>
        // --- service worker registration (required for pwa install on android) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .catch(e => console.log('SW registration failed:', e));
            });
        }

        // --- state ---
        let appState = {
            view: 'splash',
            sessions: [],
            active: {
                recording: false,
                start: null,
                total: 0,
                lapStart: 0,
                multiplier: 1,
                rate: 0,
                logs: [],
                splits: [],
                gps: [],
                distance: 0,
                pace: 0,
                gpsAccuracy: null,
                gpsStatus: 'inactive' // inactive | requesting | active | denied | unavailable
            },
            selected: null,
            interval: null,
            lastTap: null,
            detailFilter: 'all',
            selectedLog: null
        };

        // --- db ---
        let db;
        const initDB = () => {
            const req = indexedDB.open("RateCoachV4", 1);
            req.onupgradeneeded = (e) => {
                e.target.result.createObjectStore("sessions", { keyPath: "id", autoIncrement: true });
            };
            req.onsuccess = (e) => {
                db = e.target.result;
                loadSessions();
            };
        };

        const loadSessions = () => {
            const store = db.transaction("sessions", "readonly").objectStore("sessions");
            const req = store.getAll();
            req.onsuccess = () => {
                appState.sessions = req.result.sort((a, b) => b.id - a.id);
                render();
            };
        };

        const saveToDB = (name) => {
            const session = {
                name: name || `session ${new Date().toLocaleDateString()}`,
                date: new Date().toISOString(),
                total: appState.active.total,
                avgRate: appState.active.logs.reduce((a, b) => a + b.rate, 0) / appState.active.logs.length,
                logs: appState.active.logs,
                splits: appState.active.splits,
                gps: appState.active.gps,
                distance: appState.active.distance
            };
            const tx = db.transaction("sessions", "readwrite");
            const req = tx.objectStore("sessions").add(session);
            req.onsuccess = (e) => { session.id = e.target.result; };
            tx.oncomplete = () => {
                loadSessions();
                resetSession();
                appState.view = 'main';
                render();
                if (cloud.connected && session.id) {
                    cloudUploadSession(session)
                        .then(fileId => { if (fileId) attachDriveId(session.id, fileId); })
                        .catch(err => console.error('cloud upload failed', err));
                }
            };
        };

        const deleteFromDB = (id) => {
            const sess = appState.sessions.find(x => x.id === id);
            const driveFileId = sess && sess.driveFileId;
            const tx = db.transaction("sessions", "readwrite");
            tx.objectStore("sessions").delete(id);
            tx.oncomplete = () => {
                loadSessions();
                appState.view = 'recall';
                render();
                if (cloud.connected && driveFileId) {
                    cloudDeleteSession(driveFileId).catch(err => console.error('cloud delete failed', err));
                }
            };
        };

        // --- gps + wake lock ---
        let gpsWatchId = null;
        let wakeLock = null;
        let lastGoodFix = null;
        const GPS_GOOD_ACCURACY = 30; // m — discard worse fixes for distance
        const GPS_MAX_JUMP = 100; // m — discard implausible jumps between fixes
        const PACE_SMOOTHING = 0.3; // EMA factor for displayed pace

        const haversine = (a, b) => {
            const R = 6371000;
            const toRad = d => d * Math.PI / 180;
            const dLat = toRad(b.lat - a.lat);
            const dLng = toRad(b.lng - a.lng);
            const la1 = toRad(a.lat), la2 = toRad(b.lat);
            const h = Math.sin(dLat/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)**2;
            return 2 * R * Math.asin(Math.sqrt(h));
        };

        const acquireWakeLock = async () => {
            if (!('wakeLock' in navigator)) return;
            try { wakeLock = await navigator.wakeLock.request('screen'); }
            catch (e) { console.warn('wake lock failed', e); }
        };
        const releaseWakeLock = () => {
            if (wakeLock) { try { wakeLock.release(); } catch {} wakeLock = null; }
        };
        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'visible' && appState.active.recording && !wakeLock) {
                await acquireWakeLock();
            }
        });

        const startGPS = () => {
            if (gpsWatchId != null) {
                navigator.geolocation.clearWatch(gpsWatchId);
                gpsWatchId = null;
            }
            if (!('geolocation' in navigator)) {
                appState.active.gpsStatus = 'unavailable';
                return;
            }
            appState.active.gpsStatus = 'requesting';
            lastGoodFix = null;
            gpsWatchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const a = appState.active;
                    const c = pos.coords;
                    const fix = {
                        time: a.total,
                        lat: c.latitude,
                        lng: c.longitude,
                        accuracy: c.accuracy,
                        speed: c.speed == null ? null : c.speed,
                        heading: c.heading == null ? null : c.heading
                    };
                    a.gps.push(fix);
                    a.gpsAccuracy = c.accuracy;
                    a.gpsStatus = 'active';

                    // distance & pace — only count fixes with decent accuracy
                    if (c.accuracy <= GPS_GOOD_ACCURACY) {
                        if (lastGoodFix) {
                            const d = haversine(lastGoodFix, fix);
                            // reject teleports (likely from a bad prior fix)
                            if (d < GPS_MAX_JUMP) {
                                a.distance += d;
                            }
                        }
                        lastGoodFix = fix;
                    }
                    // pace from speed (smoothed)
                    if (c.speed != null && c.speed > 0.3) {
                        const instPace = 500 / c.speed; // s per 500m
                        a.pace = a.pace > 0 ? a.pace * (1 - PACE_SMOOTHING) + instPace * PACE_SMOOTHING : instPace;
                    } else if (c.speed != null && c.speed <= 0.3) {
                        a.pace = 0;
                    }
                },
                (err) => {
                    if (err.code === err.PERMISSION_DENIED) appState.active.gpsStatus = 'denied';
                    else appState.active.gpsStatus = 'unavailable';
                    console.warn('gps error', err);
                },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 30000 }
            );
        };

        const stopGPS = () => {
            if (gpsWatchId != null) {
                navigator.geolocation.clearWatch(gpsWatchId);
                gpsWatchId = null;
            }
            appState.active.gpsStatus = 'inactive';
            appState.active.gpsAccuracy = null;
            lastGoodFix = null;
        };

        const formatPace = (s) => {
            if (!s || !isFinite(s) || s <= 0) return '--:--';
            if (s > 99 * 60) return '99:59';
            const m = Math.floor(s / 60), sec = Math.floor(s % 60);
            return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
        };

        const formatDistance = (m) => {
            if (m < 1000) return `${Math.round(m)} m`;
            return `${(m / 1000).toFixed(2)} km`;
        };

        // --- leaflet lazy loader ---
        let leafletLoading = null;
        const loadLeaflet = () => {
            if (window.L) return Promise.resolve();
            if (leafletLoading) return leafletLoading;
            leafletLoading = new Promise((resolve, reject) => {
                const css = document.createElement('link');
                css.rel = 'stylesheet';
                css.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
                document.head.appendChild(css);
                const script = document.createElement('script');
                script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
                script.onload = () => resolve();
                script.onerror = reject;
                document.head.appendChild(script);
            });
            return leafletLoading;
        };

        // --- csv export ---
        const csvEscape = (v) => {
            if (v == null) return '';
            const s = String(v);
            return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
        };

        const sessionToCSV = (s) => {
            const lines = [
                `# name,${csvEscape(s.name)}`,
                `# date,${s.date}`,
                `# total_ms,${s.total}`,
                `# avg_rate,${s.avgRate}`,
                `# distance_m,${s.distance || 0}`,
                'type,time_ms,rate_spm,split_index,lat,lng,accuracy_m,speed_mps'
            ];
            const items = [];
            (s.logs || []).forEach(l => items.push({ type: 'rate', time: l.time, rate: l.rate }));
            (s.splits || []).forEach((t, i) => items.push({ type: 'split', time: t, idx: i + 1 }));
            (s.gps || []).forEach(g => items.push({ type: 'gps', time: g.time, lat: g.lat, lng: g.lng, accuracy: g.accuracy, speed: g.speed }));
            items.sort((a, b) => a.time - b.time);
            items.forEach(it => {
                if (it.type === 'rate') lines.push(`rate,${it.time},${it.rate},,,,,`);
                else if (it.type === 'split') lines.push(`split,${it.time},,${it.idx},,,,`);
                else lines.push(`gps,${it.time},,,${it.lat},${it.lng},${it.accuracy},${it.speed == null ? '' : it.speed}`);
            });
            return lines.join('\n');
        };

        const downloadSessionCSV = (s) => {
            const csv = sessionToCSV(s);
            const safeName = (s.name || 'session').replace(/[^a-z0-9]+/gi, '-').toLowerCase();
            const datePart = (s.date || new Date().toISOString()).slice(0, 10);
            const fileName = `ratecoach-${datePart}-${safeName}.csv`;
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = fileName;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        // --- google drive sync ---
        // *** REPLACE THIS WITH YOUR OAUTH 2.0 WEB CLIENT ID FROM GOOGLE CLOUD CONSOLE ***
        const DRIVE_CLIENT_ID = '954014508940-dmsv4ggk9glht2nso6movo8ln80g4ne3.apps.googleusercontent.com';
        const DRIVE_SCOPES = 'https://www.googleapis.com/auth/drive.file';
        const DRIVE_FOLDER_NAME = 'ratecoach';
        const cloudEnabled = !DRIVE_CLIENT_ID.includes('YOUR_CLIENT_ID');

        let cloud = {
            tokenClient: null,
            token: null,
            expiresAt: 0,
            folderId: null,
            connected: false,
            busy: false
        };

        const cloudInit = () => {
            if (!cloudEnabled) return;
            if (typeof google === 'undefined' || !google.accounts || !google.accounts.oauth2) {
                setTimeout(cloudInit, 250);
                return;
            }
            cloud.tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: DRIVE_CLIENT_ID,
                scope: DRIVE_SCOPES,
                callback: (res) => {
                    if (res && res.access_token) {
                        cloud.token = res.access_token;
                        cloud.expiresAt = Date.now() + (res.expires_in - 60) * 1000;
                        cloud.connected = true;
                        localStorage.setItem('rc_drive_connected', '1');
                        render();
                        cloudPullAll().catch(e => console.error('pull failed', e));
                    }
                },
                error_callback: (e) => { console.warn('drive auth error', e); }
            });
            if (localStorage.getItem('rc_drive_connected') === '1') {
                cloud.tokenClient.requestAccessToken({ prompt: '' });
            }
        };

        const cloudConnect = () => {
            if (!cloud.tokenClient) return;
            cloud.tokenClient.requestAccessToken({ prompt: 'consent' });
        };

        const cloudDisconnect = () => {
            if (cloud.token && google && google.accounts && google.accounts.oauth2) {
                try { google.accounts.oauth2.revoke(cloud.token, () => {}); } catch {}
            }
            cloud = { tokenClient: cloud.tokenClient, token: null, expiresAt: 0, folderId: null, connected: false, busy: false };
            localStorage.removeItem('rc_drive_connected');
            render();
        };

        const refreshTokenIfNeeded = () => new Promise((resolve, reject) => {
            if (Date.now() < cloud.expiresAt) return resolve();
            const prevCb = cloud.tokenClient.callback;
            cloud.tokenClient.callback = (r) => {
                cloud.tokenClient.callback = prevCb;
                if (r && r.access_token) {
                    cloud.token = r.access_token;
                    cloud.expiresAt = Date.now() + (r.expires_in - 60) * 1000;
                    resolve();
                } else reject(new Error('token refresh failed'));
            };
            cloud.tokenClient.requestAccessToken({ prompt: '' });
        });

        const driveFetch = async (url, opts = {}) => {
            await refreshTokenIfNeeded();
            const headers = { ...(opts.headers || {}), 'Authorization': `Bearer ${cloud.token}` };
            return fetch(url, { ...opts, headers });
        };

        const ensureDriveFolder = async () => {
            if (cloud.folderId) return cloud.folderId;
            const q = `mimeType='application/vnd.google-apps.folder' and name='${DRIVE_FOLDER_NAME}' and trashed=false`;
            const r = await driveFetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)&spaces=drive`);
            const data = await r.json();
            if (data.files && data.files.length > 0) { cloud.folderId = data.files[0].id; return cloud.folderId; }
            const cr = await driveFetch('https://www.googleapis.com/drive/v3/files', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: DRIVE_FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' })
            });
            const cd = await cr.json();
            cloud.folderId = cd.id;
            return cloud.folderId;
        };

        const driveMultipartBody = (metadata, csvText) => {
            const boundary = 'rcboundary' + Math.random().toString(36).slice(2);
            const body =
                `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n` +
                `--${boundary}\r\nContent-Type: text/csv; charset=UTF-8\r\n\r\n${csvText}\r\n--${boundary}--`;
            return { body, contentType: `multipart/related; boundary=${boundary}` };
        };

        const cloudUploadSession = async (s) => {
            if (!cloud.connected) return null;
            const folderId = await ensureDriveFolder();
            const csv = sessionToCSV(s);
            const safeName = (s.name || 'session').replace(/[^a-z0-9]+/gi, '-').toLowerCase();
            const datePart = (s.date || new Date().toISOString()).slice(0, 10);
            const fileName = `ratecoach-${datePart}-${safeName}.csv`;
            if (s.driveFileId) {
                const { body, contentType } = driveMultipartBody({ name: fileName }, csv);
                const r = await driveFetch(`https://www.googleapis.com/upload/drive/v3/files/${s.driveFileId}?uploadType=multipart`, {
                    method: 'PATCH', headers: { 'Content-Type': contentType }, body
                });
                return r.ok ? s.driveFileId : null;
            }
            const metadata = { name: fileName, mimeType: 'text/csv', parents: [folderId], appProperties: { ratecoachSessionId: String(s.id) } };
            const { body, contentType } = driveMultipartBody(metadata, csv);
            const r = await driveFetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST', headers: { 'Content-Type': contentType }, body
            });
            if (!r.ok) return null;
            const data = await r.json();
            return data.id;
        };

        const cloudDeleteSession = async (driveFileId) => {
            if (!cloud.connected || !driveFileId) return;
            await driveFetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}`, { method: 'DELETE' });
        };

        const csvParse = (text) => {
            const meta = {};
            const lines = text.split(/\r?\n/);
            let dataStart = lines.length;
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('# ')) {
                    const m = lines[i].slice(2).match(/^([^,]+),(.*)$/);
                    if (m) meta[m[1].trim()] = m[2];
                } else if (lines[i].startsWith('type,')) { dataStart = i + 1; break; }
            }
            const logs = [], splits = [], gps = [];
            for (let i = dataStart; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                const cols = line.split(',');
                if (cols[0] === 'rate') logs.push({ rate: parseFloat(cols[2]), time: parseInt(cols[1]) });
                else if (cols[0] === 'split') splits.push(parseInt(cols[1]));
                else if (cols[0] === 'gps') gps.push({
                    time: parseInt(cols[1]),
                    lat: parseFloat(cols[4]),
                    lng: parseFloat(cols[5]),
                    accuracy: parseFloat(cols[6]),
                    speed: cols[7] === '' ? null : parseFloat(cols[7])
                });
            }
            return {
                name: meta.name || 'imported',
                date: meta.date || new Date().toISOString(),
                total: parseInt(meta.total_ms) || 0,
                avgRate: parseFloat(meta.avg_rate) || 0,
                distance: parseFloat(meta.distance_m) || 0,
                logs, splits, gps
            };
        };

        const cloudPullAll = async () => {
            if (!cloud.connected) return;
            cloud.busy = true; render();
            try {
                const folderId = await ensureDriveFolder();
                const q = `'${folderId}' in parents and trashed=false and mimeType='text/csv'`;
                const r = await driveFetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name,modifiedTime)&pageSize=1000`);
                const data = await r.json();
                const files = data.files || [];
                const existing = new Set(appState.sessions.map(s => s.driveFileId).filter(Boolean));
                for (const f of files) {
                    if (existing.has(f.id)) continue;
                    const cr = await driveFetch(`https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`);
                    const text = await cr.text();
                    const parsed = csvParse(text);
                    parsed.driveFileId = f.id;
                    await new Promise((resolve, reject) => {
                        const tx = db.transaction("sessions", "readwrite");
                        tx.objectStore("sessions").add(parsed);
                        tx.oncomplete = resolve;
                        tx.onerror = reject;
                    });
                }
                loadSessions();
            } catch (e) {
                console.error('pull error', e);
            }
            cloud.busy = false; render();
        };

        const attachDriveId = (sessionId, fileId) => {
            const tx = db.transaction("sessions", "readwrite");
            const store = tx.objectStore("sessions");
            store.get(sessionId).onsuccess = (e) => {
                const rec = e.target.result;
                if (rec) { rec.driveFileId = fileId; store.put(rec); }
            };
            tx.oncomplete = () => loadSessions();
        };

        // --- logic ---
        const format = (ms) => {
            const m = Math.floor(ms / 60000);
            const s = Math.floor((ms % 60000) / 1000);
            const cs = Math.floor((ms % 1000) / 10);
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}.${String(cs).padStart(2, '0')}`;
        };

        const resetSession = () => {
            clearInterval(appState.interval);
            appState.active = { ...appState.active, recording: false, total: 0, lapStart: 0, rate: 0, logs: [], splits: [], gps: [], distance: 0, pace: 0, gpsAccuracy: null, gpsStatus: 'inactive' };
            appState.lastTap = null;
        };

        const start = () => {
            resetSession();
            appState.active.recording = true;
            const now = Date.now();
            appState.active.start = now;
            acquireWakeLock();
            startGPS();
            render();

            appState.interval = setInterval(() => {
                appState.active.total = Date.now() - now;
                const totalDisplay = document.getElementById('total-timer-display');
                const lapDisplay = document.getElementById('lap-timer-display');
                const distDisplay = document.getElementById('dist-display');
                const paceDisplay = document.getElementById('pace-display');
                const gpsDisplay = document.getElementById('gps-display');
                if (totalDisplay) totalDisplay.textContent = format(appState.active.total);
                if (lapDisplay) lapDisplay.textContent = format(appState.active.total - appState.active.lapStart);
                if (distDisplay) distDisplay.textContent = formatDistance(appState.active.distance);
                if (paceDisplay) paceDisplay.textContent = formatPace(appState.active.pace);
                if (gpsDisplay) gpsDisplay.textContent = gpsLabel(appState.active);
            }, 100);
        };

        const stop = () => {
            clearInterval(appState.interval);
            stopGPS();
            releaseWakeLock();
            appState.active.recording = false;
            appState.view = appState.active.logs.length > 0 ? 'save' : 'main';
            render();
        };

        const gpsLabel = (a) => {
            if (a.gpsStatus === 'denied') return 'gps off';
            if (a.gpsStatus === 'unavailable') return 'gps n/a';
            if (a.gpsStatus === 'requesting') return 'gps...';
            if (a.gpsAccuracy == null) return 'gps --';
            if (a.gpsAccuracy < 10) return `gps ${Math.round(a.gpsAccuracy)}m ●●●`;
            if (a.gpsAccuracy < 30) return `gps ${Math.round(a.gpsAccuracy)}m ●●○`;
            return `gps ${Math.round(a.gpsAccuracy)}m ●○○`;
        };

        const tap = () => {
            const now = Date.now();
            if (appState.lastTap) {
                const delta = now - appState.lastTap;
                const r = (60000 / delta) * appState.active.multiplier;
                appState.active.rate = r;
                if (appState.active.recording) {
                    appState.active.logs.push({ rate: r, time: appState.active.total });
                }
            }
            appState.lastTap = now;
            render();
        };

        const split = () => {
            if (!appState.active.recording) return;
            appState.active.splits.push(appState.active.total);
            appState.active.lapStart = appState.active.total;
            render();
        };

        // --- render ---
        const render = () => {
            const ui = document.getElementById('app-window');
            ui.innerHTML = '';

            if (appState.view === 'splash') {
                ui.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-yellow-300 font-mono">
                    <h1 class="text-4xl font-bold lowercase tracking-tighter animate-pulse">rate coach</h1>
                    <p class="text-[10px] text-zinc-500 mt-2 lowercase">ablitt & jenkin 2026</p>
                </div>`;
                setTimeout(() => { if(appState.view === 'splash'){appState.view = 'main'; render();} }, 1500);
                return;
            }

            if (appState.view === 'main') {
                const a = appState.active;
                ui.innerHTML = `<div class="flex flex-col h-full p-6">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-zinc-300 font-bold uppercase tracking-widest mb-1">total</span>
                            <div id="total-timer-display" class="text-4xl text-white font-mono font-bold tracking-tighter">${format(a.total)}</div>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] text-zinc-300 font-bold uppercase tracking-widest mb-1">lap</span>
                            <div id="lap-timer-display" class="text-2xl text-white font-mono font-bold">${format(a.total - a.lapStart)}</div>
                        </div>
                    </div>

                    <div id="tap-target" class="main-tap-zone ${a.recording ? 'recording' : ''}">
                        <span class="text-[10px] text-zinc-400 font-bold uppercase tracking-widest mb-4">spm</span>
                        <div class="text-8xl font-bold text-yellow-300 font-mono tracking-tighter">${a.rate > 0 ? a.rate.toFixed(1) : "0.0"}</div>
                        <div class="flex gap-6 mt-6 font-mono text-center">
                            <div>
                                <div class="text-[9px] text-zinc-400 font-bold uppercase tracking-widest mb-1">dist</div>
                                <div id="dist-display" class="text-base font-bold text-white">${formatDistance(a.distance)}</div>
                            </div>
                            <div>
                                <div class="text-[9px] text-zinc-400 font-bold uppercase tracking-widest mb-1">pace /500m</div>
                                <div id="pace-display" class="text-base font-bold text-yellow-300">${formatPace(a.pace)}</div>
                            </div>
                        </div>
                        <p id="gps-display" class="text-[10px] text-zinc-300 mt-6 lowercase font-mono">${a.recording ? gpsLabel(a) : 'press start to begin'}</p>
                    </div>

                    <div class="flex flex-col gap-4 mt-4">
                        <div class="flex justify-between items-center bg-zinc-950 p-2 rounded-2xl border border-zinc-900">
                            <span class="text-[9px] text-zinc-300 px-3 font-bold uppercase">strokes per tap</span>
                            <div class="flex gap-1">
                                ${[1, 2, 3].map(n => `<button onclick="setMult(${n})" class="w-12 h-12 rounded-xl text-sm font-bold transition-colors ${a.multiplier===n?'bg-yellow-300 text-black':'bg-zinc-900 text-zinc-300'}">${n}</button>`).join('')}
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            ${a.recording ? 
                                `<button onclick="split()" class="btn btn-dark lowercase">split</button><button onclick="stop()" class="btn btn-danger lowercase">stop</button>` :
                                `<button onclick="start()" class="btn btn-primary lowercase">start</button><button onclick="setView('recall')" class="btn btn-dark lowercase">recall</button>`
                            }
                        </div>
                    </div>
                </div>`;
                document.getElementById('tap-target').onclick = tap;
            }

            if (appState.view === 'recall') {
                const cloudBtn = cloudEnabled ? `<button onclick="${cloud.connected ? 'cloudDisconnect()' : 'cloudConnect()'}" class="text-[10px] font-bold lowercase tracking-widest ${cloud.connected ? 'text-yellow-300' : 'text-zinc-500'}">${cloud.busy ? 'syncing...' : (cloud.connected ? 'drive ●' : 'drive ○')}</button>` : '';
                ui.innerHTML = `<div class="flex flex-col h-full p-6">
                    <div class="flex justify-between items-center border-b border-zinc-900 pb-3 mb-6">
                        <h2 class="text-yellow-300 text-xs font-bold tracking-widest lowercase">recorded sessions</h2>
                        ${cloudBtn}
                    </div>
                    <div class="flex-grow overflow-y-auto custom-scroll space-y-2">
                        ${appState.sessions.length === 0 ? '<div class="h-full flex items-center justify-center text-zinc-300 text-xs lowercase italic">no logs found</div>' : ''}
                        ${appState.sessions.map(s => `<div onclick="detail(${s.id})" class="p-4 bg-zinc-950 border border-zinc-900 rounded-2xl flex justify-between items-center active:bg-zinc-900">
                            <div>
                                <div class="text-sm font-bold text-zinc-200">${s.name}</div>
                                <div class="text-[9px] text-zinc-400 font-bold uppercase mt-1">${new Date(s.date).toLocaleDateString()}${s.distance ? ` · ${formatDistance(s.distance)}` : ''}</div>
                            </div>
                            <div class="text-right">
                                <div class="text-xl font-bold text-yellow-300 font-mono">${s.avgRate.toFixed(1)}</div>
                                <div class="text-[8px] text-zinc-500 font-bold uppercase">avg spm</div>
                            </div>
                        </div>`).join('')}
                    </div>
                    <button onclick="setView('main')" class="mt-6 btn btn-dark lowercase">back</button>
                </div>`;
            }

            if (appState.view === 'detail' && appState.selected) {
                const s = appState.selected;
                ui.innerHTML = `<div class="flex flex-col h-full p-6">
                    <h2 class="text-yellow-300 text-xs font-bold tracking-widest lowercase border-b border-zinc-900 pb-3 mb-6">session analysis</h2>
                    <div class="flex-grow overflow-y-auto custom-scroll space-y-6">
                        <div class="grid grid-cols-2 gap-3">
                            <div class="bg-zinc-950 p-4 rounded-2xl border border-zinc-900">
                                <span class="text-[9px] text-zinc-400 font-bold uppercase block mb-1">duration</span>
                                <span class="text-xl font-bold text-white font-mono">${format(s.total)}</span>
                            </div>
                            <div class="bg-zinc-950 p-4 rounded-2xl border border-zinc-900">
                                <span class="text-[9px] text-zinc-400 font-bold uppercase block mb-1">avg rate</span>
                                <span class="text-xl font-bold text-yellow-300 font-mono">${s.avgRate.toFixed(1)}</span>
                            </div>
                            ${s.distance ? `<div class="bg-zinc-950 p-4 rounded-2xl border border-zinc-900">
                                <span class="text-[9px] text-zinc-400 font-bold uppercase block mb-1">distance</span>
                                <span class="text-xl font-bold text-white font-mono">${formatDistance(s.distance)}</span>
                            </div>
                            <div class="bg-zinc-950 p-4 rounded-2xl border border-zinc-900">
                                <span class="text-[9px] text-zinc-400 font-bold uppercase block mb-1">avg pace</span>
                                <span class="text-xl font-bold text-yellow-300 font-mono">${formatPace(s.total > 0 ? (s.total / 1000) / (s.distance / 500) : 0)}</span>
                            </div>` : ''}
                        </div>
                        ${(s.gps && s.gps.length > 1) ? `<div id="map" class="w-full h-56 rounded-2xl border border-zinc-900 overflow-hidden bg-zinc-950"></div>` : ''}
                        <canvas id="chart" class="w-full h-44 bg-black rounded-2xl border border-zinc-900"></canvas>
                        <div>
                            <div class="flex justify-between items-center bg-zinc-950 p-2 rounded-2xl border border-zinc-900 mb-3">
                                <span class="text-[9px] text-zinc-300 px-3 font-bold uppercase">log</span>
                                <div class="flex gap-1">
                                    ${['all','splits','rates'].map(f => `<button onclick="setFilter('${f}')" class="px-3 h-10 rounded-xl text-xs font-bold transition-colors lowercase ${appState.detailFilter===f?'bg-yellow-300 text-black':'bg-zinc-900 text-zinc-300'}">${f}</button>`).join('')}
                                </div>
                            </div>
                            <div class="space-y-1">
                                ${(() => {
                                    const f = appState.detailFilter;
                                    const sel = appState.selectedLog;
                                    const items = [];
                                    if (f !== 'rates') (s.splits || []).forEach((t, i) => items.push({ type: 'split', time: t, idx: i }));
                                    if (f !== 'splits') (s.logs || []).forEach(l => items.push({ type: 'rate', time: l.time, rate: l.rate }));
                                    items.sort((a, b) => a.time - b.time);
                                    if (items.length === 0) return '<span class="text-zinc-300 italic text-[10px] lowercase">no entries</span>';
                                    return items.map(it => {
                                        const isSel = sel && sel.type === it.type && sel.time === it.time;
                                        const selBg = isSel ? 'bg-zinc-800' : 'active:bg-zinc-900';
                                        const dataAttrs = `data-log-row data-log-type="${it.type}" data-log-time="${it.time}"`;
                                        if (it.type === 'split') {
                                            return `<div ${dataAttrs} onclick="selectLog('split', ${it.time})" class="flex justify-between items-center text-[11px] font-mono border-b border-zinc-900 py-2 px-2 rounded-md cursor-pointer ${selBg}"><span class="text-white lowercase font-bold">▸ split ${it.idx+1}</span><span class="text-white">${format(it.time)}</span></div>`;
                                        }
                                        return `<div ${dataAttrs} onclick="selectLog('rate', ${it.time})" class="flex justify-between items-center text-[11px] font-mono border-b border-zinc-900 py-2 px-2 rounded-md cursor-pointer ${selBg}"><span class="text-yellow-300 lowercase">${it.rate.toFixed(1)} <span class="text-yellow-300/60">spm</span></span><span class="text-white">${format(it.time)}</span></div>`;
                                    }).join('');
                                })()}
                            </div>
                        </div>
                    </div>
                    <div class="mt-6 grid grid-cols-3 gap-3">
                        <button onclick="setView('recall')" class="btn btn-dark lowercase">back</button>
                        <button onclick="exportCSV()" class="btn btn-dark lowercase">export</button>
                        <button onclick="del(${s.id})" class="btn btn-danger lowercase text-sm">delete</button>
                    </div>
                </div>`;
                setTimeout(() => draw(s), 10);
                if (s.gps && s.gps.length > 1) {
                    loadLeaflet().then(() => drawMap(s)).catch(e => console.error('map load failed', e));
                }
            }

            if (appState.view === 'save') {
                ui.innerHTML = `<div class="flex flex-col h-full p-8 items-center justify-center text-center">
                    <div class="w-20 h-20 bg-yellow-950/20 rounded-full flex items-center justify-center mb-8 border border-yellow-900/20">
                        <svg class="w-10 h-10 text-yellow-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <h2 class="text-white text-2xl font-bold lowercase mb-2">session ended</h2>
                    <p class="text-zinc-400 text-xs mb-10 lowercase">enter a name to save this log</p>
                    <input id="session-name" type="text" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl p-5 text-white text-center text-xl font-bold mb-8 focus:border-yellow-300 outline-none" placeholder="session name">
                    <div class="grid grid-cols-2 gap-3 w-full">
                        <button onclick="setView('main')" class="btn btn-dark lowercase">discard</button>
                        <button onclick="saveToDB(document.getElementById('session-name').value)" class="btn btn-primary lowercase">save</button>
                    </div>
                </div>`;
            }
        };

        const draw = (s) => {
            const canvas = document.getElementById('chart');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const b = canvas.getBoundingClientRect();
            canvas.width = b.width * dpr; canvas.height = b.height * dpr;
            ctx.scale(dpr, dpr);
            const w = b.width, h = b.height, p = 30;

            if(s.logs.length < 2) return;
            const rates = s.logs.map(l => l.rate);
            const max = Math.max(...rates, 50), min = Math.min(...rates, 10), range = max - min;
            const tRange = s.total || 1;
            const getX = (t) => p + (t / tRange) * (w - p * 2);
            const getY = (r) => h - p - ((r - min) / (range || 1)) * (h - p * 2);

            const f = appState.detailFilter;

            // horizontal gridlines
            ctx.strokeStyle = '#111'; ctx.lineWidth = 1;
            [0, 0.5, 1].forEach(v => { const y = p + v*(h-p*2); ctx.beginPath(); ctx.moveTo(p, y); ctx.lineTo(w-p, y); ctx.stroke(); });

            // session boundary markers (start + end)
            const drawBoundary = (x, label, time) => {
                ctx.strokeStyle = 'rgba(253, 224, 71, 0.9)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x, p - 8);
                ctx.lineTo(x, h - p + 8);
                ctx.stroke();
                // top cap
                ctx.beginPath();
                ctx.moveTo(x - 5, p - 8);
                ctx.lineTo(x + 5, p - 8);
                ctx.stroke();
                // bottom cap
                ctx.beginPath();
                ctx.moveTo(x - 5, h - p + 8);
                ctx.lineTo(x + 5, h - p + 8);
                ctx.stroke();
                // labels
                ctx.fillStyle = '#fde047';
                ctx.font = 'bold 8px "Roboto Mono", monospace';
                ctx.textAlign = x < w/2 ? 'left' : 'right';
                ctx.fillText(label, x < w/2 ? x : x, p - 14);
                ctx.fillStyle = '#a1a1aa';
                ctx.font = '8px "Roboto Mono", monospace';
                ctx.fillText(time, x < w/2 ? x : x, h - p + 20);
            };
            drawBoundary(p, 'START', '00:00.00');
            drawBoundary(w - p, 'END', format(s.total));

            // rate sample verticals (yellow)
            if (f !== 'splits') {
                ctx.strokeStyle = 'rgba(253, 224, 71, 0.35)';
                ctx.lineWidth = 1;
                (s.logs || []).forEach(l => { ctx.beginPath(); ctx.moveTo(getX(l.time), p); ctx.lineTo(getX(l.time), h - p); ctx.stroke(); });
            }

            // split verticals (white)
            if (f !== 'rates') {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.lineWidth = 1.5;
                (s.splits || []).forEach(t => { ctx.beginPath(); ctx.moveTo(getX(t), p); ctx.lineTo(getX(t), h - p); ctx.stroke(); });
            }

            // selected entry highlight (drawn under the rate line so it doesn't cover it)
            const sel = appState.selectedLog;
            if (sel) {
                const x = getX(sel.time);
                ctx.strokeStyle = sel.type === 'split' ? '#ffffff' : '#fde047';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(x, p - 6);
                ctx.lineTo(x, h - p + 6);
                ctx.stroke();
                // matching dot at the rate value if it's a rate entry
                if (sel.type === 'rate') {
                    const match = (s.logs || []).find(l => l.time === sel.time);
                    if (match) {
                        ctx.fillStyle = '#fde047';
                        ctx.beginPath();
                        ctx.arc(x, getY(match.rate), 4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            // rate line (smooth catmull-rom through every sample)
            ctx.strokeStyle = '#fde047'; ctx.lineWidth = 2;
            ctx.lineJoin = 'round'; ctx.lineCap = 'round';
            ctx.beginPath();
            const pts = s.logs.map(l => ({ x: getX(l.time), y: getY(l.rate) }));
            if (pts.length > 0) {
                ctx.moveTo(pts[0].x, pts[0].y);
                for (let i = 0; i < pts.length - 1; i++) {
                    const p0 = pts[i - 1] || pts[i];
                    const p1 = pts[i];
                    const p2 = pts[i + 1];
                    const p3 = pts[i + 2] || pts[i + 1];
                    const cp1x = p1.x + (p2.x - p0.x) / 6;
                    const cp1y = p1.y + (p2.y - p0.y) / 6;
                    const cp2x = p2.x - (p3.x - p1.x) / 6;
                    const cp2y = p2.y - (p3.y - p1.y) / 6;
                    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
                }
            }
            ctx.stroke();
        };

        // --- map (recall detail view) ---
        let currentMap = null;
        let currentMapHighlight = null;

        const updateMapHighlight = (s) => {
            if (!currentMap || !window.L || !s || !s.gps || s.gps.length < 1) return;
            if (currentMapHighlight) {
                try { currentMap.removeLayer(currentMapHighlight); } catch {}
                currentMapHighlight = null;
            }
            const sel = appState.selectedLog;
            if (!sel) return;
            // find nearest GPS fix to the selected time
            let nearest = null, bestDiff = Infinity;
            for (const g of s.gps) {
                if (!isFinite(g.lat) || !isFinite(g.lng)) continue;
                const d = Math.abs(g.time - sel.time);
                if (d < bestDiff) { bestDiff = d; nearest = g; }
            }
            if (!nearest) return;
            const fillColor = sel.type === 'split' ? '#ffffff' : '#fde047';
            currentMapHighlight = L.circleMarker([nearest.lat, nearest.lng], {
                color: '#000',
                fillColor,
                fillOpacity: 1,
                weight: 3,
                radius: 10
            }).addTo(currentMap);
            // pan into view if needed
            if (!currentMap.getBounds().pad(-0.1).contains([nearest.lat, nearest.lng])) {
                currentMap.panTo([nearest.lat, nearest.lng]);
            }
        };

        const drawMap = (s) => {
            if (currentMap) { try { currentMap.remove(); } catch {} currentMap = null; }
            const el = document.getElementById('map');
            if (!el || !window.L || !s.gps || s.gps.length < 2) return;
            // prefer good-accuracy fixes; fall back to all valid lat/lng
            const valid = s.gps.filter(g => isFinite(g.lat) && isFinite(g.lng));
            const good = valid.filter(g => g.accuracy <= GPS_GOOD_ACCURACY);
            const fixes = good.length > 1 ? good : valid;
            if (fixes.length < 2) return;
            const latlngs = fixes.map(g => [g.lat, g.lng]);
            currentMap = L.map(el, { zoomControl: true }).setView(latlngs[0], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            }).addTo(currentMap);
            L.polyline(latlngs, { color: '#fde047', weight: 4, opacity: 0.9 }).addTo(currentMap);
            L.circleMarker(latlngs[0], { color: '#000', fillColor: '#fde047', fillOpacity: 1, weight: 2, radius: 6 }).addTo(currentMap).bindTooltip('start');
            L.circleMarker(latlngs[latlngs.length - 1], { color: '#000', fillColor: '#ffffff', fillOpacity: 1, weight: 2, radius: 6 }).addTo(currentMap).bindTooltip('end');
            // mark splits
            (s.splits || []).forEach((splitTime, i) => {
                // find nearest gps fix to splitTime
                let nearest = null, bestDiff = Infinity;
                for (const g of fixes) {
                    const d = Math.abs(g.time - splitTime);
                    if (d < bestDiff) { bestDiff = d; nearest = g; }
                }
                if (nearest) {
                    L.circleMarker([nearest.lat, nearest.lng], { color: '#000', fillColor: '#ffffff', fillOpacity: 0.95, weight: 2, radius: 4 }).addTo(currentMap).bindTooltip(`split ${i+1}`);
                }
            });
            currentMap.fitBounds(L.latLngBounds(latlngs), { padding: [20, 20] });
            currentMapHighlight = null;
            if (appState.selectedLog) updateMapHighlight(s);
        };

        // --- global ---
        window.setView = (v) => {
            if (v !== 'detail' && currentMap) { try { currentMap.remove(); } catch {} currentMap = null; }
            appState.view = v;
            render();
        };
        window.setMult = (n) => { appState.active.multiplier = n; appState.lastTap = null; render(); };
        window.setFilter = (f) => { appState.detailFilter = f; render(); };
        window.exportCSV = () => { if (appState.selected) downloadSessionCSV(appState.selected); };
        window.cloudConnect = cloudConnect;
        window.cloudDisconnect = cloudDisconnect;
        window.cloudPullAll = cloudPullAll;
        window.selectLog = (type, time) => {
            const c = appState.selectedLog;
            appState.selectedLog = (c && c.type === type && c.time === time) ? null : { type, time };
            // partial update so the map keeps its pan/zoom
            if (appState.view === 'detail' && appState.selected) {
                const sel = appState.selectedLog;
                document.querySelectorAll('[data-log-row]').forEach(el => {
                    const t = el.getAttribute('data-log-type');
                    const tm = parseInt(el.getAttribute('data-log-time'), 10);
                    const isSel = sel && sel.type === t && sel.time === tm;
                    el.classList.toggle('bg-zinc-800', isSel);
                    el.classList.toggle('active:bg-zinc-900', !isSel);
                });
                draw(appState.selected);
                updateMapHighlight(appState.selected);
            } else {
                render();
            }
        };
        window.detail = (id) => { appState.selected = appState.sessions.find(s => s.id === id); appState.selectedLog = null; appState.view = 'detail'; render(); };
        window.del = (id) => { if(confirm("delete record?")) deleteFromDB(id); };
        window.start = start; window.stop = stop; window.split = split;

        initDB();
        cloudInit();
        render();
    </script>
</body>
</html>
